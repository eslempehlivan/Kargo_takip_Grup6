<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Paneli</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body { font-family: 'Poppins', sans-serif; background:#f4f7f6; margin:0; }

    .container { width:90%; margin:auto; }

    .main-header {
      display:flex; justify-content:space-between; align-items:center;
      padding:15px; background:white; border-radius:10px; margin-top:20px;
    }

    .nav-links a { margin-left:15px; text-decoration:none; }

    .section-title { margin-top:20px; }

    .form-group { margin:20px 0; display:flex; gap:10px; }
    input { padding:10px; border-radius:6px; border:1px solid #ddd; flex:1; }
    button { padding:10px; border:none; border-radius:6px; cursor:pointer; }

    .btn-primary { background:#3d8ef0; color:white; }

    table { width:100%; border-collapse: collapse; background:white; border-radius:10px; overflow:hidden; }
    th, td { padding:12px; border-bottom:1px solid #eee; }
    th { background:#f8f9fa; }

    .badge { padding:5px 10px; border-radius:10px; font-size:12px; }
    .badge-blue { background:#e3f2fd; color:#0d6efd; }
    .badge-green { background:#d4edda; color:#155724; }

    .actions button { margin-right:5px; }

  </style>
</head>

<body>
<div class="container">

  <header class="main-header">
    <h2>🚚 Kargo Takip Sistemi</h2>
    <nav class="nav-links">
      <a href="#">Ana Sayfa</a>
      <a href="#">Admin</a>
      <a href="#" onclick="logout()" style="color:red;">Çıkış</a>
    </nav>
  </header>

  <h1 class="section-title">Admin Paneli</h1>

  <!-- EKLEME ALANI -->
  <div class="form-group">
    <input type="text" id="kargoNo" placeholder="Kargo No">
    <input type="text" id="gonderici" placeholder="Gönderici">
    <input type="text" id="alici" placeholder="Alıcı">
    <button class="btn-primary" onclick="kargoEkle()">Ekle</button>
  </div>

  <!-- TABLO -->
  <table>
    <thead>
      <tr>
        <th>Kargo No</th>
        <th>Gönderici</th>
        <th>Alıcı</th>
        <th>Durum</th>
        <th>İşlem</th>
      </tr>
    </thead>
    <tbody id="kargoListesi"></tbody>
  </table>

</div>

<script>
  // Giriş kontrol
  if(localStorage.getItem("login") !== "true"){
    window.location.href = "admin-login.html";
  }

  function logout(){
    localStorage.removeItem("login");
    window.location.href = "admin-login.html";
  }

  // KARGO VERİSİ
  let kargolar = [
    { no:"123456", gonderici:"Ahmet", alici:"Ayşe", durum:"Yolda" },
    { no:"654321", gonderici:"Mehmet", alici:"Zeynep", durum:"Teslim Edildi" }
  ];

  function listeyiGuncelle(){
    const liste = document.getElementById("kargoListesi");
    liste.innerHTML = "";

    kargolar.forEach((kargo, index) => {

      let badgeClass = kargo.durum === "Yolda" ? "badge-blue" : "badge-green";

      liste.innerHTML += `
        <tr>
          <td>${kargo.no}</td>
          <td>${kargo.gonderici}</td>
          <td>${kargo.alici}</td>
          <td><span class="badge ${badgeClass}">${kargo.durum}</span></td>
          <td class="actions">
            <button onclick="durumDegistir(${index})">Durum</button>
            <button onclick="sil(${index})" style="background:red;color:white;">Sil</button>
          </td>
        </tr>
      `;
    });
  }

  function kargoEkle(){
    let no = document.getElementById("kargoNo").value;
    let gonderici = document.getElementById("gonderici").value;
    let alici = document.getElementById("alici").value;

    if(no && gonderici && alici){
      kargolar.push({
        no:no,
        gonderici:gonderici,
        alici:alici,
        durum:"Yolda"
      });

      listeyiGuncelle();

      document.getElementById("kargoNo").value="";
      document.getElementById("gonderici").value="";
      document.getElementById("alici").value="";
    } else {
      alert("Tüm alanları doldur!");
    }
  }

  function durumDegistir(index){
    kargolar[index].durum =
      kargolar[index].durum === "Yolda"
      ? "Teslim Edildi"
      : "Yolda";

    listeyiGuncelle();
  }

  function sil(index){
    kargolar.splice(index,1);
    listeyiGuncelle();
  }

  listeyiGuncelle();
</script>

</body>
</html>
