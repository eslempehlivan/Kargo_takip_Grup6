<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Paneli - Kargo Yönetimi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />

  <style>
    /* Buton ve Form Ekstra Stilleri */
    .btn-history {
      display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px;
      background: rgba(61,142,240,.12); color: #3d8ef0; border: 1px solid rgba(61,142,240,.28);
      border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: .76rem;
      font-weight: 600; cursor: pointer; text-decoration: none; transition: 0.2s;
    }
    .btn-history:hover { background: rgba(61,142,240,.22); transform: translateY(-1px); }

    .form-group label { font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; display: block; color: var(--text-soft); }
    .form-input { width: 100%; padding: 10px 10px 10px 35px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.7); outline: none; font-family: 'Poppins'; }

    /* Modal Stilleri */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .modal-content { background: white; margin: 10% auto; padding: 2rem; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .close-modal { cursor: pointer; font-size: 1.5rem; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="container">
      <header class="main-header glass-card">
        <div class="logo">
          <i class="fa-solid fa-truck-fast"></i>
          <h2>Kargo Takip Sistemi</h2>
        </div>
        <nav class="nav-links">
          <a href="index.html">Ana Sayfa</a>
          <a href="takip-detay.html">Takip Detayı</a>
          <a href="admin.html" class="active">Admin Paneli</a>
          <a href='#' onclick="logout()" style="color:red; font-weight: 600;">Çıkış Yap </a>
        </nav>
      </header>

      <h1 class="section-title">Admin Paneli</h1>

      <section class="dashboard-top">
        <div class="glass-card stat-card">
          <div class="stat-icon" style="color: var(--text-soft);"><i class="fa-solid fa-truck"></i></div>
          <h3 id="statTotal">1,250</h3>
          <p>Toplam Kargolar</p>
        </div>
        <div class="glass-card stat-card">
          <div class="stat-icon" style="color: var(--green);"><i class="fa-solid fa-circle-check"></i></div>
          <h3>980</h3>
          <p>Teslim Edilen</p>
        </div>
      </section>

      <section class="glass-card form-section" style="margin-bottom: 2rem; padding: 1.5rem;">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
          <i class="fa-solid fa-square-plus" style="color: var(--blue); font-size: 1.2rem;"></i>
          <h3 style="margin: 0; font-size: 1.1rem; font-weight: 600;">Yeni Kargo Kaydı Oluştur</h3>
        </div>

        <form id="addCargoForm" onsubmit="addCargo(event)" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;">
          <div class="form-group">
            <label>Takip Numarası</label>
            <div style="position: relative;">
              <i class="fa-solid fa-hashtag" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.8rem; color: #aaa;"></i>
              <input type="text" id="kargoNo" class="form-input" placeholder="Örn: 502931" required>
            </div>
          </div>
          <div class="form-group">
            <label>Gönderici</label>
            <div style="position: relative;">
              <i class="fa-solid fa-user-arrow-up" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.8rem; color: #aaa;"></i>
              <input type="text" id="gonderici" class="form-input" placeholder="Ad Soyad" required>
            </div>
          </div>
          <div class="form-group">
            <label>Alıcı</label>
            <div style="position: relative;">
              <i class="fa-solid fa-user-arrow-down" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.8rem; color: #aaa;"></i>
              <input type="text" id="alici" class="form-input" placeholder="Ad Soyad" required>
            </div>
          </div>
          <div class="form-group">
            <label>Durum</label>
            <div style="position: relative;">
              <i class="fa-solid fa-box-open" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.8rem; color: #aaa;"></i>
              <select id="durum" class="form-input" style="appearance: none; cursor: pointer;">
                <option value="Hazırlanıyor">Hazırlanıyor</option>
                <option value="Yolda">Yolda</option>
                <option value="Teslim Edildi">Teslim Edildi</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn-save" style="background: #3d8ef0; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: auto;">
            <i class="fa-solid fa-paper-plane"></i> Kaydet
          </button>
        </form>
      </section>

      <section class="glass-card table-card">
        <div class="table-wrap">
          <table id="cargoTable">
            <thead>
              <tr>
                <th>Takip No</th>
                <th>Gönderici</th>
                <th>Alıcı</th>
                <th>Durum</th>
                <th>İşlemler</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>123456</td>
                <td>Ahmet Yılmaz</td>
                <td>Ayşe Demir</td>
                <td><span class="badge badge-blue">Yolda</span></td>
                <td>
                  <div class="actions">
                    <button class="btn btn-secondary btn-icon" onclick="openUpdateModal('123456', 'Yolda')"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-danger btn-icon" onclick="this.closest('tr').remove()"><i class="fa-solid fa-trash"></i></button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <footer class="footer">Kargo Takip Sistemi © 2026</footer>
    </div>
  </div>

  <div id="updateModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Durum Güncelle</h3>
        <span class="close-modal" onclick="closeModal()">&times;</span>
      </div>
      <p>Kargo No: <strong id="modalKargoNo"></strong></p>
      <select id="newStatus" class="form-input" style="margin-top: 15px;">
        <option value="Hazırlanıyor">Hazırlanıyor</option>
        <option value="Yolda">Yolda</option>
        <option value="Teslim Edildi">Teslim Edildi</option>
      </select>
      <button onclick="saveNewStatus()" class="btn-save" style="width: 100%; margin-top: 20px; background: #2ecc71;">Güncelle</button>
    </div>
  </div>

  <script>
    // Giriş Kontrolü
    if(localStorage.getItem("login") !== "true"){
      window.location.href = "admin-login.html";
    }

    function logout(){
      localStorage.removeItem("login");
      window.location.href = "admin-login.html";
    }

    // YENİ KARGO EKLEME FONKSİYONU
    function addCargo(event) {
      event.preventDefault();
      
      const no = document.getElementById('kargoNo').value;
      const gon = document.getElementById('gonderici').value;
      const ali = document.getElementById('alici').value;
      const dur = document.getElementById('durum').value;

      let badge = dur === "Teslim Edildi" ? "badge-green" : (dur === "Yolda" ? "badge-blue" : "badge-yellow");

      const table = document.getElementById('cargoTable').getElementsByTagName('tbody')[0];
      const row = table.insertRow(0); // En üste ekle
      
      row.innerHTML = `
        <td>${no}</td>
        <td>${gon}</td>
        <td>${ali}</td>
        <td><span class="badge ${badge}">${dur}</span></td>
        <td>
          <div class="actions">
            <button class="btn btn-secondary btn-icon" onclick="openUpdateModal('${no}', '${dur}')"><i class="fa-solid fa-pen"></i></button>
            <button class="btn btn-danger btn-icon" onclick="this.closest('tr').remove()"><i class="fa-solid fa-trash"></i></button>
          </div>
        </td>
      `;

      document.getElementById('addCargoForm').reset();
      alert("Kargo listeye eklendi!");
    }

    // MODAL YÖNETİMİ
    let currentEditRow = null;

    function openUpdateModal(no, status) {
      document.getElementById('modalKargoNo').innerText = no;
      document.getElementById('newStatus').value = status;
      document.getElementById('updateModal').style.display = 'block';
      
      // Düzenlenecek satırı bul
      const rows = document.querySelectorAll("#cargoTable tbody tr");
      rows.forEach(row => {
        if(row.cells[0].innerText === no) currentEditRow = row;
      });
    }

    function closeModal() {
      document.getElementById('updateModal').style.display = 'none';
    }

    function saveNewStatus() {
      const newStatus = document.getElementById('newStatus').value;
      let badge = newStatus === "Teslim Edildi" ? "badge-green" : (newStatus === "Yolda" ? "badge-blue" : "badge-yellow");
      
      if(currentEditRow) {
        currentEditRow.cells[3].innerHTML = `<span class="badge ${badge}">${newStatus}</span>`;
        // Modal içindeki fonksiyonu güncellemek için parametreyi de yeniliyoruz
        currentEditRow.cells[4].querySelector('.btn-secondary').setAttribute('onclick', `openUpdateModal('${currentEditRow.cells[0].innerText}', '${newStatus}')`);
      }
      closeModal();
    }
  </script>
</body>
</html>
