<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Paneli - Kargo Yönetimi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />

  <style>
    .btn-history {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: rgba(61,142,240,.12);
      color: #3d8ef0;
      border: 1px solid rgba(61,142,240,.28);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: .76rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .18s, box-shadow .18s, transform .15s;
      white-space: nowrap;
    }
    .btn-history:hover {
      background: rgba(61,142,240,.22);
      box-shadow: 0 2px 12px rgba(61,142,240,.3);
      transform: translateY(-1px);
    }
    .btn-history i { font-size: .72rem; }

    /* Yeni Kargo Ekleme Formu Stilleri */
    .form-section { margin-bottom: 2rem; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.85rem; font-weight: 500; color: var(--text-main); }
    .form-group input, .form-group select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.1);
      background: rgba(255,255,255,0.5);
      font-family: 'Poppins', sans-serif;
    }
    .btn-save {
      background: var(--blue);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      align-self: flex-end;
      font-weight: 600;
      transition: 0.3s;
    }
    .btn-save:hover { opacity: 0.9; transform: scale(1.02); }

    /* Modal (Güncelleme Ekranı) Stilleri */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background: white;
      margin: 10% auto;
      padding: 2rem;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .close-modal { cursor: pointer; font-size: 1.5rem; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="container">
      <header class="main-header glass-card">
        <div class="logo">
          <i class="fa-solid fa-truck-fast"></i>
          <h2>Kargo Takip Sistemi</h2>
        </div>
        <nav class="nav-links">
          <a href="index.html">Ana Sayfa</a>
          <a href="takip-detay.html">Takip Detayı</a>
          <a href="admin.html" class="active">Admin Paneli</a>
          <a href='#' onclick="logout()" style="color:red;">Çıkış Yap </a>
        </nav>
      </header>

      <h1 class="section-title">Admin Paneli</h1>

      <section class="dashboard-top">
        <div class="glass-card stat-card">
          <div class="stat-icon" style="color: var(--text-soft);"><i class="fa-solid fa-truck"></i></div>
          <h3>1,250</h3>
          <p>Toplam Kargolar</p>
        </div>
        <div class="glass-card stat-card">
          <div class="stat-icon" style="color: var(--green);"><i class="fa-solid fa-circle-check"></i></div>
          <h3>980</h3>
          <p>Teslim Edilen</p>
        </div>
        <div class="glass-card stat-card">
          <div class="stat-icon" style="color: var(--blue);"><i class="fa-solid fa-truck-fast"></i></div>
          <h3>210</h3>
          <p>Yolda Olan</p>
        </div>
        <div class="glass-card stat-card">
          <div class="stat-icon" style="color: var(--red);"><i class="fa-solid fa-ban"></i></div>
          <h3>60</h3>
          <p>Geciken</p>
        </div>
      </section>

      <section class="glass-card form-section">
        <h3 style="margin-bottom: 15px;"><i class="fa-solid fa-plus-circle"></i> Yeni Kargo Ekle</h3>
        <form class="form-grid">
          <div class="form-group">
            <label>Takip No</label>
            <input type="text" placeholder="Örn: 998877" required>
          </div>
          <div class="form-group">
            <label>Gönderici Adı</label>
            <input type="text" placeholder="Ad Soyad" required>
          </div>
          <div class="form-group">
            <label>Alıcı Adı</label>
            <input type="text" placeholder="Ad Soyad" required>
          </div>
          <div class="form-group">
            <label>Başlangıç Durumu</label>
            <select>
              <option value="Hazırlanıyor">Hazırlanıyor</option>
              <option value="Yolda">Yolda</option>
            </select>
          </div>
          <button type="submit" class="btn-save">Kargoyu Kaydet</button>
        </form>
      </section>

      <section class="glass-card table-card">
        <div class="filters">
          <select>
            <option>Durum: Tümü</option>
            <option>Hazırlanıyor</option>
            <option>Yolda</option>
            <option>Teslim Edildi</option>
          </select>
          <button class="btn btn-secondary btn-icon"><i class="fa-solid fa-calendar"></i></button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Takip No</th>
                <th>Gönderici</th>
                <th>Alıcı</th>
                <th>Durum</th>
                <th>İşlemler</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>123456</td>
                <td>Ahmet Yılmaz</td>
                <td>Ayşe Demir</td>
                <td><span class="badge badge-blue">Yolda</span></td>
                <td>
                  <div class="actions">
                    <a href="kargo-gecmis.html?kargoNo=123456" class="btn-history" title="Geçmiş">
                      <i class="fa-solid fa-clock-rotate-left"></i>
                    </a>
                    <button class="btn btn-secondary btn-icon" onclick="openUpdateModal('123456', 'Yolda')" title="Düzenle">
                      <i class="fa-solid fa-pen"></i>
                    </button>
                    <button class="btn btn-danger btn-icon" title="Sil"><i class="fa-solid fa-trash"></i></button>
                  </div>
                </td>
              </tr>
              </tbody>
          </table>
        </div>
      </section>

      <footer class="footer">Kargo Takip Sistemi © 2026</footer>
    </div>
  </div>

  <div id="updateModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Durum Güncelle</h3>
        <span class="close-modal" onclick="closeModal()">&times;</span>
      </div>
      <form id="updateForm">
        <div class="form-group" style="margin-bottom: 20px;">
          <label>Takip No: <strong id="modalKargoNo"></strong></label>
          <select id="newStatus" style="width: 100%; margin-top: 10px;">
            <option value="Hazırlanıyor">Hazırlanıyor</option>
            <option value="Yolda">Yolda</option>
            <option value="Teslim Edildi">Teslim Edildi</option>
            <option value="İptal Edildi">İptal Edildi</option>
          </select>
        </div>
        <button type="submit" class="btn-save" style="width: 100%;">Güncelle</button>
      </form>
    </div>
  </div>

  <script>
    if(localStorage.getItem("login") !== "true"){
      window.location.href = "admin-login.html";
    }

    function logout(){
      localStorage.removeItem("login");
      window.location.href = "admin-login.html";
    }

    function openUpdateModal(no, currentStatus) {
      document.getElementById('updateModal').style.display = 'block';
      document.getElementById('modalKargoNo').innerText = no;
    }

    function closeModal() {
      document.getElementById('updateModal').style.display = 'none';
    }

    window.onclick = function(event) {
      if (event.target == document.getElementById('updateModal')) {
        closeModal();
      }
    }
  </script>
</body>
</html>
