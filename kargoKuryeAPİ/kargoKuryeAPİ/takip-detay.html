<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kargo Takip Detayı</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* CSS'te bu kısımların olduğundan emin ol, yoksa bar görünmez */
    body { font-family: 'Poppins', sans-serif; background: #f4f7f6; }
    .glass-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 20px auto; max-width: 600px; }
    
    .progress-line {
      width: 100%;
      height: 10px;
      background: #e0e0e0;
      border-radius: 5px;
      position: relative;
      margin: 20px 0;
      overflow: hidden;
    }

    .progress-line-fill {
      height: 100%;
      background: #27ae60; /* Yeşil Renk */
      width: 0%; 
      transition: width 0.8s ease-in-out;
    }

    .progress-steps { display: flex; justify-content: space-between; }
    .step { text-align: center; color: #ccc; flex: 1; }
    .step.active { color: #27ae60; font-weight: bold; }
    .step-circle { width: 30px; height: 30px; border: 2px solid #ccc; border-radius: 50%; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; }
    .step.active .step-circle { border-color: #27ae60; background: #27ae60; color: white; }
    .info-box { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
  </style>
</head>

<body>
<div class="page-wrapper">
<div class="container">

<header class="main-header glass-card">
  <div class="logo">
    <i class="fa-solid fa-truck-fast"></i>
    <h2>Kargo Takip Sistemi</h2>
  </div>
</header>

<section class="glass-card detail-card">

<a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Geri Dön</a>

<h1 class="detail-header">Kargo Takip Detayı</h1>

<div class="info-box"></div>

<div class="status-box">
  <h3 id="durumMetni">Durum:</h3>
  <p>Tahmini Teslim Tarihi: <span id="teslimTarihi"></span></p>
</div>

<div class="progress-wrap">
  <div class="progress-line">
    <div class="progress-line-fill" id="progressFill"></div>
  </div>

  <div class="progress-steps">
    <div class="step">
      <div class="step-circle"><i class="fa-solid fa-check"></i></div>
      <p>Hazırlanıyor</p>
    </div>
    <div class="step">
      <div class="step-circle"><i class="fa-solid fa-check"></i></div>
      <p>Yolda</p>
    </div>
    <div class="step">
      <div class="step-circle"><i class="fa-solid fa-check"></i></div>
      <p>Teslim Edildi</p>
    </div>
  </div>
</div>

<div class="map-box" style="margin-top:20px; border-radius:12px; overflow:hidden;">
  <iframe id="kargoHarita" width="100%" height="300" style="border:0;"></iframe>
</div>

</section>
</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const kargoNo = params.get("kargoNo");

const kargolar = {
  "123456": { gonderici: "Ahmet Yılmaz", alici: "Ayşe Demir", durum: "Yolda", koordinat: "40.9918,29.0283" },
  "654321": { gonderici: "Mehmet Kaya", alici: "Zeynep Çelik", durum: "Hazırlanıyor", koordinat: "39.9208,32.8541" },
  "987654": { gonderici: "Elif Şahin", alici: "Can Aydın", durum: "Teslim Edildi", koordinat: "38.4622,27.2161" },
  "401905": { gonderici: "Arda Aslan", alici: "Ela Vardar", durum: "Yolda", koordinat: "41.0082,28.9784" }
};

const infoBox = document.querySelector(".info-box");
const statusText = document.getElementById("durumMetni");
const mapFrame = document.getElementById("kargoHarita");
const steps = document.querySelectorAll(".step");
const teslimSpan = document.getElementById("teslimTarihi");
const progressFill = document.getElementById("progressFill");

if (kargoNo && kargolar[kargoNo]) {
  const kargo = kargolar[kargoNo];

  infoBox.innerHTML = `
    <p><strong>Takip Numarası:</strong> ${kargoNo}</p>
    <p><strong>Gönderici:</strong> ${kargo.gonderici}</p>
    <p><strong>Alıcı:</strong> ${kargo.alici}</p>
  `;

  statusText.textContent = "Durum: " + kargo.durum;

  
  mapFrame.src = `https://maps.google.com/maps?q=${kargo.koordinat}&hl=tr&z=14&output=embed`;

  const durumIndex = {
    "Hazırlanıyor": 0,
    "Yolda": 1,
    "Teslim Edildi": 2
  };

  const index = durumIndex[kargo.durum];

 
  steps.forEach((step, i) => {
    if (i <= index) step.classList.add("active");
    else step.classList.remove("active");
  });

  
  const progressWidth = ["5%", "50%", "100%"];
  setTimeout(() => {
    progressFill.style.width = progressWidth[index];
  }, 100);

  
  let bugun = new Date();
  let teslimTarihi = new Date();
  if (kargo.durum === "Hazırlanıyor") teslimTarihi.setDate(bugun.getDate() + 3);
  else if (kargo.durum === "Yolda") teslimTarihi.setDate(bugun.getDate() + 1);
  else teslimTarihi = bugun;

  const options = { day: 'numeric', month: 'long', year: 'numeric' };
  teslimSpan.textContent = teslimTarihi.toLocaleDateString("tr-TR", options);

} else {
  infoBox.innerHTML = `<p style="color:red; text-align:center;">Hatalı Numara ❌</p>`;
  document.querySelector(".status-box").style.display = "none";
  document.querySelector(".progress-wrap").style.display = "none";
  document.querySelector(".map-box").style.display = "none";
}
</script>

</body>
</html>
