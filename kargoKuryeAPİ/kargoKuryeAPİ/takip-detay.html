<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kargo Takip Detayı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <div class="container">
      <header class="main-header glass-card">
        <div class="logo">
          <i class="fa-solid fa-truck-fast"></i>
          <h2>Kargo Takip Sistemi</h2>
        </div>
        <nav class="nav-links">
          <a href="index.html">Ana Sayfa</a>
          <a href="takip-detay.html" class="active">Takip Detayı</a>
          <a href="admin.html">Admin Paneli</a>
        </nav>
      </header>

      <section class="glass-card detail-card">
        <a href="index.html" class="back-link">
          <i class="fa-solid fa-arrow-left"></i> Geri Dön
        </a>

        <h1 class="detail-header">Kargo Takip Detayı</h1>

        <div class="info-box">
          <p><strong>Takip Numarası:</strong> <span id="kargoNo"></span></p>
          <p><strong>Gönderici:</strong> Ahmet Yılmaz</p>
          <p><strong>Alıcı:</strong> Ayşe Demir</p>
        </div>

        <div class="status-box">
          <h3>Durum: Yolda</h3>
          <p>Tahmini Teslim Tarihi: 25 Mayıs 2024</p>
        </div>

        <div class="progress-wrap">
          <div class="progress-line">
            <div class="progress-line-fill"></div>
          </div>

          <div class="progress-steps">
            <div class="step active">
              <div class="step-circle">
                <i class="fa-solid fa-check"></i>
              </div>
              <p>Hazırlanıyor</p>
            </div>

            <div class="step active">
              <div class="step-circle">
                <i class="fa-solid fa-check"></i>
              </div>
              <p>Yolda</p>
            </div>

            <div class="step">
              <div class="step-circle">
                <i class="fa-solid fa-check"></i>
              </div>
              <p>Teslim Edildi</p>
            </div>
          </div>
        </div>
         <div class="map-box" style="padding: 0; overflow: hidden; border-radius: 12px;">
          <iframe 
            id="kargoHarita"
            src="" 
            width="100%" 
            height="300" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
        
      </section>

      <footer class="footer">
        Kargo Takip Sistemi © 2026
      </footer>
    </div>
  </div>
<script>
    const params = new URLSearchParams(window.location.search);
    const kargoNo = params.get("kargoNo");

    const kargolar = {
      "123456": { gonderici: "Ahmet Yılmaz", alici: "Ayşe Demir", durum: "Yolda", koordinat: "40.9918,29.0283" },
      "654321": { gonderici: "Mehmet Kaya", alici: "Zeynep Çelik", durum: "Hazırlanıyor", koordinat: "39.9208,32.8541" },
      "987654": { gonderici: "Elif Şahin", alici: "Can Aydın", durum: "Teslim Edildi", koordinat: "38.4622,27.2161" },
      "112233": { gonderici: "Mustafa Yücel", alici: "Fatma Keskin", durum: "Yolda", koordinat: "40.2117,28.9592" },
      "445566": { gonderici: "Büşra Aslan", alici: "Volkan Sönmez", durum: "Hazırlanıyor", koordinat: "36.8841,30.7056" },
      "778899": { gonderici: "Emre Polat", alici: "Gizem Tekin", durum: "Teslim Edildi", koordinat: "39.7767,30.5206" },
      "334455": { gonderici: "Selin Doğan", alici: "Burak Yıldırım", durum: "Yolda", koordinat: "36.9914,35.3308" },
      "667788": { gonderici: "Ozan Güler", alici: "Merve Aslan", durum: "Hazırlanıyor", koordinat: "41.0027,39.7168" }
    };

    if (kargoNo && kargolar[kargoNo]) {
      document.querySelector(".info-box").innerHTML = `
        <p><strong>Takip Numarası:</strong> ${kargoNo}</p>
        <p><strong>Gönderici:</strong> ${kargolar[kargoNo].gonderici}</p>
        <p><strong>Alıcı:</strong> ${kargolar[kargoNo].alici}</p>
      `;

      document.querySelector(".status-box h3").textContent = "Durum: " + kargolar[kargoNo].durum;

      const latLon = kargolar[kargoNo].koordinat;
      const haritaURL = `https://maps.google.com/maps?q=${latLon}&hl=tr&z=14&output=embed`;
      document.getElementById("kargoHarita").src = haritaURL;

      const durum = kargolar[kargoNo].durum;
      const steps = document.querySelectorAll(".step");
      steps.forEach(step => step.classList.remove("active"));

      if (durum === "Hazırlanıyor") {
        steps[0].classList.add("active");
      } else if (durum === "Yolda") {
        steps[0].classList.add("active");
        steps[1].classList.add("active");
      } else if (durum === "Teslim Edildi") {
        steps.forEach(step => step.classList.add("active"));
      }

    } else {
      document.querySelector(".info-box").innerHTML = `
        <p style="color: red; font-weight: bold; text-align: center; font-size: 18px;">Hatalı Numara! Kargo bulunamadı ❌</p>
      `;
      document.querySelector(".status-box").style.display = "none";
      document.querySelector(".progress-wrap").style.display = "none";
      document.querySelector(".map-box").style.display = "none";
    }
  </script>
</body>
</html>
