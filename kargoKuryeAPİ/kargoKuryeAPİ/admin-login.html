<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Giriş</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212; /* Arka plan koyu kalsın diye eklendi */
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            text-align: center;
            color: white;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            box-sizing: border-box; /* Genişlik taşmasını engeller */
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #3d8ef0;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }

        button:hover {
            background: #2563eb;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #ffffff;
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 14px;
            height: 20px; /* Hata mesajı yokken kaymayı önler */
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Admin Giriş</h2>
        
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        
        <button onclick="login()">Giriş Yap</button>
        
        <br>
        
        <a href="index.html" class="back-link">← Ana Sayfaya Dön</a>
        
        <p id="error" class="error"></p>
    </div>

    <script>
        function login() {
            const userField = document.getElementById("username");
            const passField = document.getElementById("password");
            const errorDisplay = document.getElementById("error");

            let user = userField.value.trim();
            let pass = passField.value.trim();

            if (user === "" || pass === "") {
                errorDisplay.innerText = "Boş bırakılamaz";
                return;
            }

            if (user === "admin" && pass === "1234") {
                localStorage.setItem("login", "true");
                window.location.href = "admin.html";
            } else {
                errorDisplay.innerText = "Hatalı giriş";
            }
        }
    </script>

</body>
</html>
