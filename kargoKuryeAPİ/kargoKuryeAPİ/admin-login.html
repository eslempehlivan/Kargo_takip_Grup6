<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Admin Giriş</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box {
      width:350px;
      padding:30px;
      border-radius:12px;
      background: rgba(255,255,255,0.05);
      text-align:center;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      border:none;
    }

    button {
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#3d8ef0;
      color:white;
      cursor:pointer;
    }

    button:hover {
      background:#2563eb;
    }

    .error {
      color:red;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Admin Giriş</h2>

  <input type="text" id="username" placeholder="Kullanıcı Adı">
  <input type="password" id="password" placeholder="Şifre">

  <button onclick="login()">Giriş Yap</button>

  <p id="error" class="error"></p>
</div>

<script>
function login() {

  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "" || pass === ""){
    document.getElementById("error").innerText = "Boş bırakılamaz";
    return;
  }

  if(user === "admin" && pass === "1234"){
    localStorage.setItem("login", "true");
    window.location.href = "admin.html";
  } else {
    document.getElementById("error").innerText = "Hatalı giriş";
  }
}
</script>

</body>
</html>
