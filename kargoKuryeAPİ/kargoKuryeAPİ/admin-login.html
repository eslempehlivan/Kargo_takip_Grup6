<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Giriş</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-body">
  <div class="login-page">
    <div class="login-box">
      <h1>
        <i class="fa-solid fa-user-shield"></i>
        Admin Giriş
      </h1>

      <p class="login-subtitle">Yönetim paneline erişmek için giriş yapın.</p>

      <div class="form-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="admin" />
      </div>

      <div class="form-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" placeholder="1234" />
      </div>

      <button class="login-btn" onclick="login()">Giriş Yap</button>

      <p id="error" class="error-text"></p>
      <div class="note-text">Demo giriş: admin / 1234</div>
    </div>
  </div>

  <script>
    function login() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      const error = document.getElementById("error");

      if (!user || !pass) {
        error.textContent = "Kullanıcı adı ve şifre boş bırakılamaz.";
        return;
      }

      if (user === "admin" && pass === "1234") {
        localStorage.setItem("login", "true");
        window.location.href = "admin.html";
      } else {
        error.textContent = "Hatalı giriş bilgileri.";
      }
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
