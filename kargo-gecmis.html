<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kargo Tarihçesi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080d1a;
      --card:       rgba(255,255,255,0.042);
      --border:     rgba(255,255,255,0.08);
      --accent:     #3d8ef0;
      --green:      #1fd6a0;
      --yellow:     #f5a623;
      --red:        #f06060;
      --text:       #dde3f5;
      --muted:      #7a87a8;
      --radius:     16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* animated mesh background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 25%, rgba(61,142,240,.13) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 85% 75%, rgba(31,214,160,.09) 0%, transparent 65%),
        radial-gradient(ellipse 40% 35% at 55% 10%, rgba(240,96,96,.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 24px 16px 72px; }

    /* ── Header ── */
    .main-header {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      padding: 15px 26px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); backdrop-filter: blur(18px);
      margin-bottom: 28px;
    }
    .logo { display: flex; align-items: center; gap: 11px; }
    .logo i { font-size: 1.4rem; color: var(--accent); }
    .logo h2 { font-size: 1rem; font-weight: 600; letter-spacing: -.2px; }
    .nav-links { display: flex; gap: 18px; flex-wrap: wrap; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: .84rem; font-weight: 500; transition: color .2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    /* ── Back ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: .8rem; color: var(--muted); text-decoration: none;
      margin-bottom: 26px; transition: color .2s;
    }
    .back-link:hover { color: var(--accent); }

    /* ── Hero meta ── */
    .hero {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); backdrop-filter: blur(16px);
      padding: 28px 32px;
      margin-bottom: 32px;
      display: flex; flex-wrap: wrap; gap: 22px; align-items: center; justify-content: space-between;
    }
    .hero-left h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.4px; margin-bottom: 8px; }
    .hero-left .chip {
      font-family: 'JetBrains Mono', monospace; font-size: .74rem;
      background: rgba(61,142,240,.1); border: 1px solid rgba(61,142,240,.22);
      color: var(--accent); padding: 3px 11px; border-radius: 20px;
      display: inline-block; margin-bottom: 14px;
    }
    .people { display: flex; flex-direction: column; gap: 4px; }
    .people-row { display: flex; align-items: center; gap: 8px; font-size: .8rem; color: var(--muted); }
    .people-row i { color: var(--accent); width: 14px; }
    .people-row span { color: var(--text); font-weight: 500; }

    .hero-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .76rem; font-weight: 600; padding: 5px 14px; border-radius: 20px;
    }
    .badge-blue   { background: rgba(61,142,240,.12); color: var(--accent);  border: 1px solid rgba(61,142,240,.25); }
    .badge-green  { background: rgba(31,214,160,.12); color: var(--green);   border: 1px solid rgba(31,214,160,.25); }
    .badge-yellow { background: rgba(245,166,35,.12);  color: var(--yellow); border: 1px solid rgba(245,166,35,.25); }

    .eta { font-size: .76rem; color: var(--muted); text-align: right; line-height: 1.6; }
    .eta strong { color: var(--text); }

    /* ── Section header ── */
    .sec-title {
      font-size: .82rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.6px;
      margin-bottom: 22px;
      display: flex; align-items: center; gap: 10px;
    }
    .sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Timeline ── */
    .timeline { position: relative; padding-left: 38px; }
    .timeline::before {
      content: ''; position: absolute; left: 12px; top: 8px; bottom: 8px; width: 2px;
      background: linear-gradient(to bottom, var(--accent), rgba(61,142,240,.1));
      border-radius: 4px;
    }

    .tl-item {
      position: relative; margin-bottom: 14px;
      opacity: 0; transform: translateX(-14px);
      animation: fadeSlide .38s ease forwards;
    }
    .tl-item:nth-child(1)  { animation-delay: .04s; }
    .tl-item:nth-child(2)  { animation-delay: .10s; }
    .tl-item:nth-child(3)  { animation-delay: .16s; }
    .tl-item:nth-child(4)  { animation-delay: .22s; }
    .tl-item:nth-child(5)  { animation-delay: .28s; }
    .tl-item:nth-child(6)  { animation-delay: .34s; }
    .tl-item:nth-child(7)  { animation-delay: .40s; }
    .tl-item:nth-child(8)  { animation-delay: .46s; }
    .tl-item:nth-child(9)  { animation-delay: .52s; }
    .tl-item:nth-child(10) { animation-delay: .58s; }

    @keyframes fadeSlide { to { opacity: 1; transform: translateX(0); } }

    .tl-dot {
      position: absolute; left: -30px; top: 18px;
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .58rem; z-index: 2;
    }
    .tl-dot.done    { background: var(--green);  box-shadow: 0 0 10px rgba(31,214,160,.4); color: #fff; }
    .tl-dot.active  { background: var(--yellow); box-shadow: 0 0 12px rgba(245,166,35,.5); color: #fff; animation: glow 1.8s infinite; }
    .tl-dot.pending { background: rgba(255,255,255,.07); border: 2px solid var(--border); color: var(--muted); }

    @keyframes glow {
      0%,100% { box-shadow: 0 0 10px rgba(245,166,35,.5); }
      50%      { box-shadow: 0 0 22px rgba(245,166,35,.85); }
    }

    .tl-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 20px;
      transition: border-color .2s, background .2s;
    }
    .tl-card:hover { border-color: rgba(61,142,240,.3); background: rgba(61,142,240,.04); }
    .tl-card.is-active { border-color: rgba(245,166,35,.35); background: rgba(245,166,35,.05); }
    .tl-card.is-done   { border-color: rgba(31,214,160,.18); }

    .tl-head { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 7px; }
    .tl-event { font-size: .9rem; font-weight: 600; }
    .tl-time  { font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--muted); white-space: nowrap; }

    .tl-location { font-size: .78rem; color: var(--muted); display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .tl-location i { color: var(--accent); font-size: .72rem; }
    .tl-location .city-tag {
      background: rgba(61,142,240,.1); border: 1px solid rgba(61,142,240,.2);
      color: var(--accent); font-size: .68rem; font-weight: 600;
      padding: 1px 8px; border-radius: 10px; letter-spacing: .3px;
    }

    .tl-desc { font-size: .78rem; color: var(--muted); line-height: 1.65; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 70px 20px; color: var(--muted); }
    .empty i { font-size: 2.4rem; display: block; margin-bottom: 14px; color: var(--border); }
    .empty p { font-weight: 600; color: var(--red); }

    /* ── Footer ── */
    .footer { text-align: center; margin-top: 52px; font-size: .74rem; color: var(--muted); opacity: .55; }

    @media (max-width: 540px) {
      .hero { flex-direction: column; }
      .hero-right { align-items: flex-start; }
      .eta { text-align: left; }
    }
  </style>
</head>

const hero    = document.getElementById("hero");

if (kargoNo && kargoData[kargoNo]) {
  const d = kargoData[kargoNo];

  const badgeMap = {
    blue:   { cls: "badge-blue",   icon: "fa-truck",        label: d.durum },
    green:  { cls: "badge-green",  icon: "fa-circle-check", label: d.durum },
    yellow: { cls: "badge-yellow", icon: "fa-box-open",     label: d.durum }
  };
  const b = badgeMap[d.durum_key];

  hero.innerHTML = `
    <div class="hero-left">
      <h1>Rota &amp; Şube Geçmişi</h1>
      <span class="chip"># ${kargoNo}</span>
      <div class="people">

        <div class="people-row"><i class="fa-solid fa-location-dot"></i> Alıcı: <span>${d.alici}</span></div>

      </div>
    </div>
    <div class="hero-right">
      <span class="badge ${b.cls}"><i class="fa-solid ${b.icon}"></i> ${b.label}</span>
      <div class="eta">Tahmini Teslim<br><strong>${d.tahmini}</strong></div>
    </div>
  `;

      <div class="tl-dot ${r.durum}">
        <i class="fa-solid ${r.durum === 'pending' ? 'fa-clock' : 'fa-check'}"></i>
      </div>
      <div class="tl-card ${r.durum === 'active' ? 'is-active' : r.durum === 'done' ? 'is-done' : ''}">

          <span class="tl-event">${r.olay}</span>
          <span class="tl-time">${r.zaman}</span>
        </div>
        <div class="tl-location">
          <i class="fa-solid fa-building"></i>

        </div>
        <div class="tl-desc">${r.aciklama}</div>
