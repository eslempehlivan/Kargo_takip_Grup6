<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Paneli - Kargo Yönetimi</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #3d8ef0; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 20px; display: flex; gap: 10px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; }
        button { padding: 10px 20px; background: #3d8ef0; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2563eb; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; }
        .yolda { background: #fff3cd; color: #856404; }
        .teslim { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Kargo Yönetim Paneli</h2>

    <div class="form-group">
        <input type="text" id="kargoNo" placeholder="Kargo No (Örn: KR123)">
        <input type="text" id="alici" placeholder="Alıcı Adı">
        <button onclick="kargoEkle()">Ekle</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Kargo No</th>
                <th>Alıcı</th>
                <th>Durum</th>
                <th>İşlem</th>
            </tr>
        </thead>
        <tbody id="kargoListesi">
        </tbody>
    </table>
</div>

<script>
    let kargolar = [
        { no: "ABC001", alici: "Ahmet Yılmaz", durum: "Yolda" },
        { no: "ABC002", alici: "Ayşe Demir", durum: "Teslim Edildi" }
    ];

    function listeyiGuncelle() {
        const liste = document.getElementById("kargoListesi");
        liste.innerHTML = "";

        kargolar.forEach((kargo, index) => {
            let durumClass = kargo.durum === "Yolda" ? "yolda" : "teslim";
            
            liste.innerHTML += `
                <tr>
                    <td>${kargo.no}</td>
                    <td>${kargo.alici}</td>
                    <td><span class="status-badge ${durumClass}">${kargo.durum}</span></td>
                    <td>
                        <button onclick="durumDegistir(${index})" style="background:#6c757d; font-size:12px;">Durum Güncelle</button>
                    </td>
                </tr>
            `;
        });
    }

    function kargoEkle() {
        let no = document.getElementById("kargoNo").value;
        let alici = document.getElementById("alici").value;

        if(no && alici) {
            kargolar.push({ no: no, alici: alici, durum: "Yolda" });
            listeyiGuncelle();
            document.getElementById("kargoNo").value = "";
            document.getElementById("alici").value = "";
        } else {
            alert("Lütfen tüm alanları doldurun!");
        }
    }

    function durumDegistir(index) {
        if(kargolar[index].durum === "Yolda") {
            kargolar[index].durum = "Teslim Edildi";
        } else {
            kargolar[index].durum = "Yolda";
        }
        listeyiGuncelle();
    }

    listeyiGuncelle();
</script>

</body>
</html>
